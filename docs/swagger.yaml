  # ==================== COMMUNITY ENDPOINTS ====================
  /community/create:
    post:
      tags:
        - Community
      summary: Create a new community
      description: |
        Create a new community with optional avatar and background images

        **Middleware:** AuthProvider, FileUpload(avatar_photo, background_photo)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - slug
                - shortDesc
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 50
                slug:
                  type: string
                  pattern: '^[a-z0-9-]+$'
                shortDesc:
                  type: string
                  maxLength: 150
                description:
                  type: string
                  maxLength: 5000
                isPrivate:
                  type: boolean
                  default: false
                avatar_photo:
                  type: string
                  format: binary
                background_photo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Community created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Community'

  /community/{communityId}:
    get:
      tags:
        - Community
      summary: Get community by ID
      description: Retrieve community details
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Community retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Community'

    put:
      tags:
        - Community
      summary: Update a community
      description: |
        Update community details (only by owner or admin moderators)

        **Middleware:** AuthProvider, FileUpload(avatar_photo, background_photo)
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                shortDesc:
                  type: string
                description:
                  type: string
                isPrivate:
                  type: boolean
                avatar_photo:
                  type: string
                  format: binary
                background_photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Community updated successfully

    delete:
      tags:
        - Community
      summary: Delete a community
      description: Permanently delete a community (only by owner)
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Community deleted successfully

  /community/search:
    get:
      tags:
        - Community
      summary: Search communities
      description: Search for communities by name or description
      security:
        - BearerAuth: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Community'

  /community/user/join/{communityId}:
    post:
      tags:
        - Community
      summary: Join a community
      description: |
        Join a community as a member

        **Middleware:** AuthProvider, CheckUserNotBanned
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string

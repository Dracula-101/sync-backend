        '200':
          description: Joined communities retrieved

  /community/moderator/{communityId}/add:
    post:
      tags:
        - Community
      summary: Add a moderator
      description: Add a user as moderator to the community (requires owner or admin permissions)
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - role
              properties:
                userId:
                  type: string
                role:
                  type: string
                  enum: [moderator, admin]
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Moderator added successfully

  /community/moderator/{communityId}/ban/{userId}:
    post:
      tags:
        - Community
      summary: Ban a user from community
      description: |
        Ban a user from the community (requires moderator permissions)

        **Middleware:** AuthProvider, RequiresModerator
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                duration:
                  type: string
                  description: Ban duration (e.g., "7d", "30d", "permanent")
      responses:
        '200':
          description: User banned successfully


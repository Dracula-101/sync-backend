            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Joined community successfully"

  /community/user/leave/{communityId}:
    post:
      tags:
        - Community
      summary: Leave a community
      description: Leave a community you're a member of
      security:
        - BearerAuth: []
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Left community successfully

  /community/user/joined:
    get:
      tags:
        - Community
      summary: Get joined communities
      description: Get all communities the user is a member of
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
